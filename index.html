    <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uma surpresa 💖</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
    color: white;
    height: 100vh;
    overflow: hidden;
}

/* Tela inicial */
#inicio {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.botao {
    margin-top: 20px;
    padding: 15px 30px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #ff4d6d, #ff758f);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

.botao:hover {
    transform: scale(1.1);
}

/* Conteúdo */
#conteudo {
    display: none;
    text-align: center;
    padding: 20px;
    animation: fade 2s ease;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    font-size: 32px;
    margin-bottom: 15px;
}

p {
    font-size: 18px;
    margin: 10px 0;
}

/* Corações */
.coracao {
    position: absolute;
    color: #ff4d6d;
    animation: cair linear infinite;
}

@keyframes cair {
    0% {top: -10%;}
    100% {top: 110%;}
}

/* Botão final */
.final {
    margin-top: 20px;
    font-size: 16px;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- Tela inicial -->
<div id="inicio">
    <h1>  com amor </h1></h1>
    <button class="botao" onclick="abrir()">Clique aqui</button>
</div>

<!-- Conteúdo -->
<div id="conteudo">
    <h1>Feliz Aniversário ^-^</h1>
    <p id="mensagem"></p>

    <p class="final">Com carinho 💕</p>
</div>

<!-- Música (opcional) -->
<audio id="musica" src=""></audio>

<script>
const nome = "michely"; // MUDA AQUI

const texto = `Hoje é um dia muito especial...
E eu não podia deixar passar sem te lembrar
o quanto você é importante 💖

Feliz aniversário, ${nome}!
Que seu dia seja incrível ✨`;

function abrir() {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("conteudo").style.display = "block";

    escreverTexto();
    criarCoracoes();

    // Música (se colocar link)
    document.getElementById("musica").play().catch(()=>{});
}

// efeito digitando
function escreverTexto() {
    let i = 0;
    const el = document.getElementById("mensagem");

    function digitar() {
        if (i < texto.length) {
            el.innerHTML += texto.charAt(i);
            i++;
            setTimeout(digitar, 40);
        }
    }

    digitar();
}

// corações
function criarCoracoes() {
    for (let i = 0; i < 25; i++) {
        let c = document.createElement("div");
        c.innerHTML = "❤️";
        c.className = "coracao";
        c.style.left = Math.random() * 100 + "vw";
        c.style.fontSize = (Math.random() * 25 + 15) + "px";
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
